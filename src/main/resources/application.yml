spring:
  application:
    name: Yaqazah
  datasource:
    url: jdbc:postgresql://localhost:5432/yaqazah_db
    username: postgres
    password: "0000"
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  minio:
    endpoint: http://localhost:9000
    access-key: admin
    secret-key: password123
    bucket-name: user-images

  data:
    redis:
      host: localhost
      port: 6379
#      username:
      # password:

  cache:
    type: redis